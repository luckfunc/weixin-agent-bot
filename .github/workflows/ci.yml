name: release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: node -v
      - run: npm -v

      - run: npm ci
      - run: npm run build

      # OIDC (Trusted Publisher on npm). Do not use --provenance while this repo is
      # private — npm only accepts provenance from public GitHub repos (422 otherwise).
      # After making the repo public, you can switch to: npm publish --provenance
      - name: Publish to npm via OIDC
        run: npm publish
